kind = "web"
previewPath = "/"
title = "NyaLiqour — Premium Spirits"
version = "1.0.0"
id = "artifacts/nyaliqour"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24563
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/nyaliqour run dev"

[services.env]
PORT = "24563"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/nyaliqour", "run", "build"]
publicDir = "artifacts/nyaliqour/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
